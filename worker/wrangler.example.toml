name = "mtntheman-trip-tracker"
main = "tracker-worker.js"
compatibility_date = "2026-05-11"

# Use either a route on mtntheman.com:
# routes = [
#   { pattern = "mtntheman.com/api/tracker/*", zone_name = "mtntheman.com" }
# ]
#
# Or attach a custom domain in the Cloudflare dashboard:
# tracker-api.mtntheman.com

[[d1_databases]]
binding = "DB"
database_name = "mtntheman-trip-tracker"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[vars]
PUBLIC_DELAY_MINUTES = "30"
COORDINATE_DECIMALS = "3"
MAX_PUBLIC_POINTS = "5000"
STALE_MINUTES = "180"
CORS_ALLOWED_ORIGINS = "https://mtntheman.com,https://www.mtntheman.com,http://mtntheman.com,http://www.mtntheman.com,https://mtntheman.github.io,http://localhost:4000,http://127.0.0.1:4000"

# Optional broad trip bounds. Set all four or omit all four.
# MIN_LAT = "18"
# MAX_LAT = "72"
# MIN_LON = "-170"
# MAX_LON = "-50"

# Rejects 0,0 by default. Only set this during deliberate testing.
# ALLOW_ZERO_COORDS = "true"

# Do not put secrets in this file. Use:
# wrangler secret put TRACKER_USERNAME
# wrangler secret put TRACKER_PASSWORD
# wrangler secret put TRACKER_TOKEN
