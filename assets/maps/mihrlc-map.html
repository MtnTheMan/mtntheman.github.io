<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Michigan High Resolution Land Cover Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --panel: rgba(255, 253, 240, 0.96);
    --panel-strong: #fffdf0;
    --fg: #1d261d;
    --muted: #576257;
    --border: rgba(29, 38, 29, 0.2);
    --accent: #2a7d4f;
    --focus: #174d89;
    --shadow: rgba(21, 35, 24, 0.18);
  }

  html,
  body,
  #app {
    height: 100%;
    margin: 0;
  }

  body {
    color: var(--fg);
    font: 14px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #app {
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 620px;
  }

  header {
    z-index: 900;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-strong);
    box-shadow: 0 2px 12px var(--shadow);
  }

  .title {
    min-width: 260px;
  }

  h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 750;
  }

  .subtitle {
    margin-top: 1px;
    color: var(--muted);
    font-size: 12px;
  }

  .controls {
    display: flex;
    flex: 1 1 auto;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;
    gap: 8px 10px;
  }

  label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 30px;
    white-space: nowrap;
  }

  input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
  }

  input[type="range"] {
    width: 132px;
    accent-color: var(--accent);
  }

  output {
    min-width: 34px;
    color: var(--muted);
    text-align: right;
  }

  .view-select {
    max-width: min(280px, 80vw);
  }

  button {
    min-height: 30px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: #fff;
    color: var(--fg);
    padding: 4px 10px;
    font: inherit;
    cursor: pointer;
  }

  button:hover,
  button:focus-visible {
    border-color: var(--focus);
    outline: none;
  }

  select {
    min-height: 30px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: #fff;
    color: var(--fg);
    padding: 4px 8px;
    font: inherit;
  }

  select:hover,
  select:focus-visible {
    border-color: var(--focus);
    outline: none;
  }

  #map {
    min-height: 0;
    background: #d9e5d8;
  }

  .leaflet-control-layers {
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 3px 12px var(--shadow);
  }

  .leaflet-control-layers-expanded {
    padding: 7px 10px 7px 7px;
  }

  .leaflet-mihrlcPane-pane img.leaflet-tile {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .legend {
    position: absolute;
    right: 12px;
    bottom: 28px;
    z-index: 800;
    width: min(250px, calc(100% - 24px));
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 4px 16px var(--shadow);
    padding: 10px;
    color: var(--fg);
  }

  .legend-title {
    margin-bottom: 7px;
    font-weight: 700;
  }

  .legend-row {
    display: grid;
    grid-template-columns: 18px 1fr;
    align-items: center;
    gap: 7px;
    margin-top: 5px;
    color: var(--muted);
    font-size: 12px;
  }

  .legend-swatch {
    width: 16px;
    height: 16px;
    border: 1px solid rgba(0, 0, 0, 0.22);
    box-sizing: border-box;
  }

  .status {
    position: absolute;
    left: 12px;
    bottom: 28px;
    z-index: 800;
    max-width: min(410px, calc(100% - 24px));
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 4px 16px var(--shadow);
    padding: 8px 10px;
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 820px) {
    #app {
      min-height: 100%;
    }

    header {
      align-items: flex-start;
      flex-direction: column;
      gap: 8px;
    }

    .title {
      min-width: 0;
    }

    .controls {
      justify-content: flex-start;
      width: 100%;
    }

    .legend {
      right: 8px;
      bottom: 26px;
    }

    .status {
      left: 8px;
      right: 8px;
      bottom: 188px;
    }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">
      <h1>Michigan High Resolution Land Cover</h1>
      <div class="subtitle">Statewide 0.6 m county land-cover products</div>
    </div>
    <div class="controls" aria-label="Map controls">
      <label><input type="checkbox" id="showLandCover" checked> Land cover</label>
      <label for="opacity">Opacity <output id="opacityOut">85%</output></label>
      <input type="range" id="opacity" min="0" max="1" value="0.85" step="0.05">
      <label for="countySelect">View <select id="countySelect" class="view-select"></select></label>
    </div>
  </header>
  <div id="map" aria-label="Interactive map of Michigan High Resolution Land Cover statewide products"></div>
  <aside class="legend" aria-label="Land cover legend">
    <div class="legend-title">Land Cover Classes</div>
    <div class="legend-row"><span class="legend-swatch" style="background:#00c5ff"></span><span>Water</span></div>
    <div class="legend-row"><span class="legend-swatch" style="background:#00a884"></span><span>Wetlands</span></div>
    <div class="legend-row"><span class="legend-swatch" style="background:#267300"></span><span>Tree canopy</span></div>
    <div class="legend-row"><span class="legend-swatch" style="background:#a3ff73"></span><span>Low vegetation</span></div>
    <div class="legend-row"><span class="legend-swatch" style="background:#ffaa00"></span><span>Barren</span></div>
    <div class="legend-row"><span class="legend-swatch" style="background:#ff0000"></span><span>Structures</span></div>
    <div class="legend-row"><span class="legend-swatch" style="background:#9c9c9c"></span><span>Impervious surfaces</span></div>
    <div class="legend-row"><span class="legend-swatch" style="background:#000"></span><span>Impervious roads</span></div>
  </aside>
  <div class="status" id="status">Opening statewide land cover...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/pmtiles@4.4.1/dist/pmtiles.js"></script>

const controls = {
  showLandCover: document.getElementById("showLandCover"),
  opacity: document.getElementById("opacity"),
  opacityOut: document.getElementById("opacityOut"),
  countySelect: document.getElementById("countySelect"),
  status: document.getElementById("status")
};

function setStatus(message) {
  controls.status.textContent = message;
}

if (!window.L || !window.pmtiles) {
  setStatus("The map libraries did not load. Please refresh the page.");
} else {
  const map = L.map("map", {
    zoomControl: true,
    maxZoom: 19,
    maxBounds: [[41.0, -91.2], [48.8, -82.0]],
    maxBoundsViscosity: 0.45
  });

  const streetMap = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  });

  const imagery = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    maxZoom: 19,
    attribution: "Tiles &copy; Esri - Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community"
  });

  streetMap.addTo(map);
  map.fitBounds(STATE_BOUNDS, { padding: [28, 28] });
  map.createPane("mihrlcPane");
  map.getPane("mihrlcPane").style.zIndex = 450;

  const archive = new pmtiles.PMTiles(STATE_URL);
  const landCoverLayer = pmtiles.leafletRasterLayer(archive, {
    minZoom: 7,
    maxNativeZoom: 16,
    maxZoom: 19,
    opacity: Number(controls.opacity.value),
    pane: "mihrlcPane",
    attribution: 'Michigan High Resolution Land Cover (MiHRLC), 0.6 m county products from 2022 NAIP imagery'
  });

  landCoverLayer.addTo(map);

  L.control.layers({
    "OpenStreetMap": streetMap,
    "Imagery": imagery
  }, {
    "MiHRLC statewide land cover": landCoverLayer
  }, {
    collapsed: false,
    position: "topright"
  }).addTo(map);

  let loadedTiles = 0;
  let failedTiles = 0;

  landCoverLayer.on("tileload", () => {
    loadedTiles += 1;
    setStatus(failedTiles ? "Some land-cover tiles did not load in this view." : "Statewide land cover ready.");
  });

  landCoverLayer.on("tileerror", () => {
    failedTiles += 1;
    if (loadedTiles === 0) {
      setStatus("Land-cover tiles are not loading in this view.");
    } else {
      setStatus("Some land-cover tiles did not load in this view.");
    }
  });

  function syncLandCoverVisibility() {
    const shouldShow = controls.showLandCover.checked;
    const isShown = map.hasLayer(landCoverLayer);
    if (shouldShow && !isShown) {
      landCoverLayer.addTo(map);
    } else if (!shouldShow && isShown) {
      map.removeLayer(landCoverLayer);
    }
  }

  function syncOpacity() {
    const opacity = Number(controls.opacity.value);
    controls.opacityOut.textContent = `${Math.round(opacity * 100)}%`;
    landCoverLayer.setOpacity(opacity);
  }

  function populateCountySelect() {
    const statewideOption = document.createElement("option");
    statewideOption.value = "statewide";
    statewideOption.textContent = "Statewide";
    controls.countySelect.appendChild(statewideOption);

    COUNTY_VIEWS.forEach((view) => {
      const option = document.createElement("option");
      option.value = view.id;
      option.textContent = view.label;
      controls.countySelect.appendChild(option);
    });
  }

  function fitSelectedView() {
    const selected = controls.countySelect.value;
    if (selected === "statewide") {
      map.fitBounds(STATE_BOUNDS, { padding: [28, 28] });
      return;
    }

    const view = COUNTY_VIEWS.find((item) => item.id === selected);
    if (view) {
      map.fitBounds(view.bounds, { padding: [28, 28] });
    }
  }

  controls.showLandCover.addEventListener("change", syncLandCoverVisibility);
  controls.opacity.addEventListener("input", syncOpacity);
  controls.countySelect.addEventListener("change", fitSelectedView);

  map.on("baselayerchange", () => {
    if (map.hasLayer(landCoverLayer)) {
      landCoverLayer.bringToFront();
    }
  });

  map.on("overlayadd", (event) => {
    if (event.layer === landCoverLayer) {
      controls.showLandCover.checked = true;
    }
  });

  map.on("overlayremove", (event) => {
    if (event.layer === landCoverLayer) {
      controls.showLandCover.checked = false;
    }
  });

  populateCountySelect();
  syncOpacity();
}
</script>
</body>
</html>
